version: "3.8"

services:
  postgres:
    image: postgis/postgis:15-3.3
    container_name: stac_api_postgres
    environment:
      POSTGRES_DB: stac_api_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d stac_api_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
